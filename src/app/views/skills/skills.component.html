<section class="min-h-[85vh] py-16 px-6 bg-white">
    <div class="container mx-auto max-w-5xl">
        <!-- Título de la Sección -->
        <div class="text-center mb-16 animate-fade-in">
            <h2 class="text-blue-600 font-bold tracking-[0.2em] uppercase text-sm mb-2">Experiencia Técnica</h2>
            <h1 class="text-4xl md:text-5xl font-black text-gray-900">Habilidades Destacadas</h1>
            <div class="w-24 h-1 bg-blue-500 mx-auto mt-6 rounded-full"></div>
        </div>

        <!-- Grid de Habilidades -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-16 gap-y-12 animate-fade-in" style="animation-delay: 0.2s;">

            <!-- Recorro habilidades desde el componente -->
            @for (skill of skills; track skill) {
            <div class="group">
                <div class="flex justify-between items-end mb-2">
                    <div class="flex items-center gap-3">
                        <span class="text-3xl filter drop-shadow-sm group-hover:scale-110 transition-transform">{{
                            skill.icon }}</span>
                        <h3 class="text-xl font-bold text-gray-800">{{ skill.name }}</h3>
                    </div>
                    <span class="text-blue-600 font-bold">{{ skill.level }}%</span>
                </div>
                <!-- Barra de progreso -->
                <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden shadow-inner cursor-default">
                    <div class="bg-gradient-to-r from-blue-500 to-indigo-500 h-3 rounded-full transition-all duration-1000 ease-out group-hover:brightness-110"
                        [style.width.%]="skill.level">
                    </div>
                </div>
            </div>
            }

        </div>

        <!-- Herramientas Adicionales / Etiquetas -->
        <div class="mt-20 text-center animate-fade-in" style="animation-delay: 0.4s;">
            <p class="text-gray-500 font-medium mb-6">Otras tecnologías y herramientas con las que he trabajado:</p>
            <div class="flex flex-wrap justify-center gap-4 max-w-3xl mx-auto">
                <span
                    class="px-5 py-2.5 bg-gray-50 text-gray-700 font-semibold rounded-xl border border-gray-200 hover:border-blue-300 hover:text-blue-600 hover:shadow-md transition-all cursor-default">Tailwind
                    CSS</span>
                <span
                    class="px-5 py-2.5 bg-gray-50 text-gray-700 font-semibold rounded-xl border border-gray-200 hover:border-blue-300 hover:text-blue-600 hover:shadow-md transition-all cursor-default">GitHub</span>
                <span
                    class="px-5 py-2.5 bg-gray-50 text-gray-700 font-semibold rounded-xl border border-gray-200 hover:border-blue-300 hover:text-blue-600 hover:shadow-md transition-all cursor-default">Figma</span>
                <span
                    class="px-5 py-2.5 bg-gray-50 text-gray-700 font-semibold rounded-xl border border-gray-200 hover:border-blue-300 hover:text-blue-600 hover:shadow-md transition-all cursor-default">Postman</span>
                <span
                    class="px-5 py-2.5 bg-gray-50 text-gray-700 font-semibold rounded-xl border border-gray-200 hover:border-blue-300 hover:text-blue-600 hover:shadow-md transition-all cursor-default">Scrum</span>
            </div>
        </div>
    </div>
</section>
