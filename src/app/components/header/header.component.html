<header class="bg-gray-900 text-white shadow-md">
  <div class="container mx-auto px-4 py-4 flex justify-between items-center">
    <!-- Logo -->
    <a routerLink="/" class="text-2xl font-bold tracking-tight text-blue-400 hover:text-white transition-colors">
      MiPortfolio
    </a>
    
    <!-- Navegación Desktop -->
    <nav class="hidden md:flex space-x-6">
      <a routerLink="/" routerLinkActive="text-blue-400"
         [routerLinkActiveOptions]="{exact: true}"
         class="hover:text-blue-300 font-medium transition-colors">Sobre Mí</a>
      <a routerLink="/skills" routerLinkActive="text-blue-400"
         class="hover:text-blue-300 font-medium transition-colors">Habilidades</a>
      <a routerLink="/projects" routerLinkActive="text-blue-400"
         class="hover:text-blue-300 font-medium transition-colors">Proyectos</a>
      <a routerLink="/contact" routerLinkActive="text-blue-400"
         class="hover:text-blue-300 font-medium transition-colors">Contacto</a>
    </nav>
  </div>
</header>
